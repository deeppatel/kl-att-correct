<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Attendance Correction</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@13.1.0/dist/handsontable.full.min.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="login" class="modal">
  <form id="loginForm" class="card">
    <h2>Sign in</h2>
    <input name="username" placeholder="Username" autocomplete="username" required />
    <input name="password" type="password" placeholder="Password" autocomplete="current-password" required />
    <button type="submit">Sign in</button>
    <p class="hint" id="loginErr"></p>
  </form>
</div>

<header id="topbar" hidden>
  <strong>Attendance Correction</strong>
  <span class="sep"></span>
  <label>Month <input type="month" id="month" /></label>
  <label>Employee <input id="empFilter" placeholder="emp code or name" /></label>
  <button id="loadBtn">Load</button>
  <span class="sep"></span>
  <button id="saveBtn" class="primary" disabled>Save Changes (<span id="dirtyCount">0</span>)</button>
  <button id="discardBtn" disabled>Discard</button>
  <span class="sep"></span>
  <button id="auditBtn">Audit</button>
  <span id="draftStatus" class="draft-status"></span>
  <span class="grow"></span>
  <span id="who"></span>
  <button id="logoutBtn">Logout</button>
</header>

<main id="grid" hidden></main>

<div id="auditModal" class="modal" hidden>
  <div class="card big">
    <h2>Audit Log <button class="close" data-close>×</button></h2>
    <div id="auditBody">Loading…</div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/handsontable@13.1.0/dist/handsontable.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
